name: Destroy n8n on GCP Cloud Run

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: GCP project ID
        required: true
        type: string
      region:
        description: GCP region used during deployment
        required: true
        default: us-south1
        type: string
      service_name:
        description: Cloud Run service name used during deployment
        required: true
        default: n8n
        type: string

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PROJECT_ID: ${{ inputs.project_id }}
      SERVICE_NAME: ${{ inputs.service_name }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_STATE_BUCKET: ${{ inputs.project_id }}-n8n-tfstate
      TF_VAR_project_id: ${{ inputs.project_id }}
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_service_name: ${{ inputs.service_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ inputs.project_id }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate gcloud CLI
        run: |
          gcloud auth activate-service-account --key-file="${{ steps.auth.outputs.credentials_file_path }}"
          gcloud config set project "${{ inputs.project_id }}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${SERVICE_NAME}"

      - name: Terraform destroy
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform destroy -auto-approve

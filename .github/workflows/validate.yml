name: Validate and Plan

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: GCP project ID
        required: true
        type: string
      region:
        description: GCP region
        required: true
        default: us-central1
        type: string
      service_name:
        description: Cloud Run service name
        required: true
        default: n8n
        type: string
      database_name:
        description: PostgreSQL database name for n8n
        required: true
        default: n8n
        type: string
      min_instances:
        description: 0 for scale-to-zero, 1 for always-on
        required: true
        default: "1"
        type: string
      max_instances:
        description: Maximum Cloud Run instances
        required: true
        default: "3"
        type: string

jobs:
  validate:
    name: Validate and Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TF_VAR_project_id: ${{ inputs.project_id }}
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_service_name: ${{ inputs.service_name }}
      TF_VAR_database_name: ${{ inputs.database_name }}
      TF_VAR_min_instances: ${{ inputs.min_instances }}
      TF_VAR_max_instances: ${{ inputs.max_instances }}

    steps:
      - name: Check required inputs
        run: |
          if [ -z "${{ inputs.project_id }}" ]; then
            echo "❌ project_id is required"
            exit 1
          fi
          echo "✅ project_id: ${{ inputs.project_id }}"
          echo "✅ region: ${{ inputs.region }}"
          echo "✅ service_name: ${{ inputs.service_name }}"
          echo "✅ database_name: ${{ inputs.database_name }}"

      - name: Check GCP_SA_KEY secret
        env:
          GCP_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_KEY" ]; then
            echo "❌ GCP_SA_KEY secret is missing"
            echo "Add it at: Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "✅ GCP_SA_KEY secret is configured"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ inputs.project_id }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate gcloud CLI
        run: |
          gcloud auth activate-service-account --key-file="${{ steps.auth.outputs.credentials_file_path }}"
          gcloud config set project "${{ inputs.project_id }}"

      - name: Enable required APIs
        run: |
          gcloud services enable \
            cloudresourcemanager.googleapis.com \
            serviceusage.googleapis.com \
            storage.googleapis.com \
            --project="${{ inputs.project_id }}"

      - name: Verify GCP project access
        run: |
          gcloud projects describe "${{ inputs.project_id }}"
          echo "✅ GCP project is accessible"

      - name: Bootstrap Terraform state bucket
        shell: bash
        run: |
          set -euo pipefail
          BUCKET="${{ inputs.project_id }}-n8n-tfstate"

          if ! gcloud storage buckets describe "gs://${BUCKET}" --project="${{ inputs.project_id }}" >/dev/null 2>&1; then
            echo "⚠️ State bucket not found. Creating..."
            gcloud storage buckets create "gs://${BUCKET}" \
              --project="${{ inputs.project_id }}" \
              --location="US" \
              --uniform-bucket-level-access
            gcloud storage buckets update "gs://${BUCKET}" --versioning
            echo "✅ State bucket created."
          else
            echo "✅ State bucket found."
          fi

      - name: Terraform init
        shell: bash
        run: |
          set -euo pipefail
          BUCKET="${{ inputs.project_id }}-n8n-tfstate"
          terraform -chdir=terraform init \
            -backend-config="bucket=${BUCKET}" \
            -backend-config="prefix=${{ inputs.service_name }}"

      - name: Terraform format check
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform fmt -check

      - name: Terraform validate
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform validate

      - name: Terraform plan
        shell: bash
        run: |
          set -euo pipefail
          echo ""
          echo "========== TERRAFORM PLAN =========="
          echo ""
          terraform -chdir=terraform plan -no-color
          echo ""
          echo "===================================="
          echo "Review the plan above before deploying."
